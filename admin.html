<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - آل تميم</title>
    
    <!-- سكريبتات الفيربيز الرسمية لمشروعك -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Bootstrap 5.3 RTL & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #C9A961; --dark-bg: #0b0f19; }
        * { font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-bg); color: #f8f9fa; min-height: 100vh; padding: 2rem 0; }
        .admin-card { background: rgba(20, 27, 45, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .order-details-box { background: #0f1626; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 10px 15px; white-space: pre-line; color: #e4d3a3; font-size: 0.95rem; }
        .badge-pending { background-color: #ffc107; color: #000; }
        .badge-success { background-color: #28a745; color: #fff; }
        .header-title { color: #fff; font-weight: 700; border-bottom: 2px solid var(--gold); padding-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-12 text-center mb-5">
            <h2 class="header-title"><i class="bi bi-shield-lock me-2"></i>لوحة تحكم طلبات آل تميم</h2>
            <p class="text-muted mt-2">إدارة الطلبات الحية القادمة من المتصفح والتطبيق</p>
        </div>
    </div>

    <!-- مكان عرض الأوردرات تلقائياً -->
    <div class="row justify-content-center" id="orders_container">
        <div class="text-center text-muted py-5" id="no_orders_msg">
            <div class="spinner-border text-warning mb-3" role="status"></div>
            <h5>جاري الاتصال بقاعدة البيانات وجلب الطلبات...</h5>
        </div>
    </div>
</div>

<script>
    // إعدادات مشروعك الثابتة (آل تميم)
    const firebaseConfig = {
        apiKey: "AIzaSyCqgpR6RkmGDMKeLZcYpJP43-8W_NePTBg",
        authDomain: "altamim-project.firebaseapp.com",
        databaseURL: "https://altamim-project-default-rtdb.firebaseio.com",
        projectId: "altamim-project",
        storageBucket: "altamim-project.firebasestorage.app",
        messagingSenderId: "24194456334",
        appId: "1:24194456334:web:9ea26ffb015b625912555f",
        measurementId: "G-T2XWZ3757B"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // الاستماع الفوري والحي للنود المخصص للطلبات
    database.ref('AlTamim_Orders').on('value', (snapshot) => {
        const container = document.getElementById('orders_container');
        container.innerHTML = ""; // تنظيف الشاشة قبل العرض الجديد
        
        const orders = snapshot.val();
        
        if (!orders) {
            container.innerHTML = `
                <div class="col-md-6 text-center text-muted py-5">
                    <i class="bi bi-box-seam display-4 d-block mb-3" style="color: var(--gold)"></i>
                    <h5>لا توجد طلبات حالية في قاعدة البيانات.</h5>
                </div>`;
            return;
        }

        // تحويل الأوبجكت إلى مصفوفة وترتيبها من الأحدث للأقدم بناءً على التايم ستامب
        const sortedOrders = Object.keys(orders).map(key => ({
            id: key,
            ...orders[key]
        })).sort((a, b) => b.timestamp - a.timestamp);

        // تكرار عرض الكروت بناءً على البيانات القادمة
        sortedOrders.forEach(order => {
            const card = document.createElement('div');
            card.className = "col-md-6 col-lg-4";
            
            // تحديد لون الشارة بناءً على الحالة
            const statusBadge = order.status === "pending" ? 
                `<span class="badge badge-pending p-2 rounded"><i class="bi bi-clock me-1"></i>قيد الانتظار</span>` : 
                `<span class="badge badge-success p-2 rounded"><i class="bi bi-check-circle me-1"></i>تم التأكيد</span>`;

            // زرار التأكيد يختفي لو تم التأكيد فعلاً
            const actionButton = order.status === "pending" ? 
                `<button class="btn btn-success btn-sm w-100 mb-2 fw-bold" onclick="updateStatus('${order.id}', 'confirmed')"><i class="bi bi-check-lg me-1"></i>تأكيد الطلب وتنبيه العميل</button>` : '';

            // صياغة الوقت بشكل مقروء
            const orderDate = new Date(order.timestamp).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'}) + " | " + new Date(order.timestamp).toLocaleTimeString('ar-EG', {day: 'numeric', month: 'short'});

            card.innerHTML = `
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <small class="text-muted"><i class="bi bi-calendar3 me-1"></i>${orderDate}</small>
                        ${statusBadge}
                    </div>
                    
                    <h5 class="fw-bold text-white mb-1"><i class="bi bi-person me-2" style="color:var(--gold)"></i>${order.client_name}</h5>
                    <p class="mb-3" dir="ltr" style="text-align: right;"><i class="bi bi-telephone me-2 text-success"></i><a href="tel:${order.client_phone}" class="text-success text-decoration-none fw-bold">${order.client_phone}</a></p>
                    
                    <div class="mb-3">
                        <label class="text-muted small mb-1 fw-bold"><i class="bi bi-basket3 me-1"></i> الأصناف المطلوبة:</label>
                        <!-- خاصية white-space: pre-line في الـ CSS هنا هي السحر اللي بيخلي الأصناف تنزل تحت بعض ومنظمة -->
                        <div class="order-details-box">${order.order_details}</div>
                    </div>

                    <div class="mb-3">
                        <label class="text-muted small mb-1 fw-bold"><i class="bi bi-geo-alt me-1"></i> العنوان بالتفصيل:</label>
                        <p class="text-white-50 bg-dark p-2 rounded small border border-secondary mb-0">${order.detailed_address}</p>
                    </div>

                    <hr style="border-color: rgba(255,255,255,0.1)">
                    
                    ${actionButton}
                    <button class="btn btn-outline-danger btn-sm w-100 fw-bold" onclick="deleteOrder('${order.id}')"><i class="bi bi-trash3 me-1"></i>حذف الأوردر نهائياً</button>
                </div>
            `;
            container.appendChild(card);
        });
    });

    // وظيفة تحديث حالة الطلب (تأكيد)
    function updateStatus(orderId, newStatus) {
        database.ref('AlTamim_Orders/' + orderId).update({
            status: newStatus
        }).then(() => {
            console.log("تم تحديث الحالة بنجاح.");
        }).catch(err => alert("حدث خطأ أثناء التحديث: " + err));
    }

    // وظيفة حذف الأوردر نهائياً
    function deleteOrder(orderId) {
        if(confirm("هل أنت متأكد من حذف هذا الأوردر نهائياً من السيستم؟")) {
            database.ref('AlTamim_Orders/' + orderId).remove().then(() => {
                console.log("تم الحذف.");
            }).catch(err => alert("حدث خطأ أثناء الحذف: " + err));
        }
    }
</script>
</body>
</html>
