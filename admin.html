<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الأدمن</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body style="background:#1a1a1a; color:white; padding:20px;">

<div class="container">
    <h3>طلبات جديدة</h3>
    <div id="admin_orders" class="row"></div>
</div>

<script>
    // --- انسخ نفس الـ firebaseConfig اللي فوق بالظبط هنا ---
    const firebaseConfig = { /* نفس الكود اللي فوق */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('AlTamim_Orders').on('value', snap => {
        const orders = snap.val();
        const container = document.getElementById('admin_orders');
        container.innerHTML = "";
        
        for(let id in orders) {
            if(orders[id].status === "pending") {
                container.innerHTML += `
                    <div class="card bg-dark text-white p-3 mb-2">
                        <p>${orders[id].client_name} - ${orders[id].order_details}</p>
                        <button class="btn btn-success" onclick="updateStatus('${id}', 'confirmed')">تأكيد</button>
                    </div>`;
            } else if(orders[id].status === "confirmed") {
                container.innerHTML += `
                    <div class="card bg-warning text-black p-3 mb-2">
                        <p>مؤكد: ${orders[id].client_name}</p>
                        <button class="btn btn-primary" onclick="updateStatus('${id}', 'delivered')">تم التوصيل (للسجل)</button>
                    </div>`;
            }
        }
    });

    function updateStatus(id, newStatus) {
        db.ref('AlTamim_Orders/' + id).update({ status: newStatus });
    }
</script>
</body>
</html>
