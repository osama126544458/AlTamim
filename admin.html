<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأدمن - آل تميم</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Bootstrap 5.3 RTL & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #C9A961; --dark-bg: #0b0f19; --card-bg: rgba(20, 27, 45, 0.8); }
        * { font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-bg); color: #f8f9fa; min-height: 100vh; padding-bottom: 3rem; }
        
        .nav-pills .nav-link { color: #fff; background: rgba(255,255,255,0.05); margin: 5px; border-radius: 10px; font-weight: bold; }
        .nav-pills .nav-link.active { background: linear-gradient(135deg, var(--gold) 0%, #E4D3A3 100%); color: #0b0f19; }
        
        .admin-card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .form-control { background: #0f1626; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: #fff; padding: 0.75rem; }
        .header-title { color: #fff; font-weight: 900; border-bottom: 3px solid var(--gold); padding-bottom: 10px; display: inline-block; }
        
        .admin-table-view { width: 100%; border-collapse: collapse; margin-top: 5px; background: #0f1626; border-radius: 8px; overflow: hidden; }
        .admin-table-view th { background: rgba(201, 169, 97, 0.15); color: var(--gold); padding: 8px; font-size: 0.85rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .admin-table-view td { padding: 8px; text-align: center; color: #fff; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.05); }
        .top-client-row { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="container text-center my-4">
    <h2 class="header-title"><i class="bi bi-shield-lock me-2"></i>لوحة تحكم آل تميم</h2>
</div>

<div class="container mb-4">
    <ul class="nav nav-pills nav-fill justify-content-center" id="adminTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" id="offers-tab" data-bs-toggle="tab" data-bs-target="#offers_page" type="button">📢 الإعلانات</button></li>
        <li class="nav-item"><button class="nav-link" id="new-orders-tab" data-bs-toggle="tab" data-bs-target="#new_orders_page" type="button">📥 طلبات جديدة <span class="badge bg-danger rounded-pill" id="new_count">0</span></button></li>
        <li class="nav-item"><button class="nav-link" id="confirmed-orders-tab" data-bs-toggle="tab" data-bs-target="#confirmed_orders_page" type="button">🚚 طلبات مؤكدة <span class="badge bg-warning text-dark rounded-pill" id="confirmed_count">0</span></button></li>
        <li class="nav-item"><button class="nav-link" id="delivered-orders-tab" data-bs-toggle="tab" data-bs-target="#delivered_orders_page" type="button">✅ تم التوصيل</button></li>
        <li class="nav-item"><button class="nav-link" id="clients-tab" data-bs-toggle="tab" data-bs-target="#clients_page" type="button">🏆 أبرز العملاء</button></li>
    </ul>
</div>

<div class="container tab-content" id="adminTabsContent">

    <!-- الصفحة 1: الإعلانات -->
    <div class="tab-pane fade show active" id="offers_page" role="tabpanel">
        <div class="row justify-content-center"><div class="col-md-8"><div class="admin-card">
            <h5 class="fw-bold mb-3 text-white">📢 نشر إعلان أو عرض جديد للزبائن</h5>
            <textarea class="form-control mb-3" id="offer_text" rows="3" placeholder="اكتب نص العرض هنا..."></textarea>
            <button class="btn btn-warning w-100 fw-bold mb-3" onclick="publishOffer()">نشر الإعلان فوراً</button>
            <button class="btn btn-outline-danger btn-sm w-100" onclick="deleteOffer()">❌ حذف الإعلان الحالي</button>
        </div></div></div>
    </div>

    <!-- الصفحة 2: الجديدة -->
    <div class="tab-pane fade" id="new_orders_page" role="tabpanel"><div class="row" id="new_orders_container"></div></div>

    <!-- الصفحة 3: المؤكدة -->
    <div class="tab-pane fade" id="confirmed_orders_page" role="tabpanel"><div class="row" id="confirmed_orders_container"></div></div>

    <!-- الصفحة 4: المتوصلة -->
    <div class="tab-pane fade" id="delivered_orders_page" role="tabpanel"><div class="row" id="delivered_orders_container"></div></div>

    <!-- الصفحة 5: أبرز العملاء -->
    <div class="tab-pane fade" id="clients_page" role="tabpanel"><div class="row justify-content-center"><div class="col-md-8"><div class="admin-card">
        <h5 class="fw-bold mb-4 text-white">🏆 قائمة العملاء الأكثر طلباً</h5>
        <div id="clients_container"></div>
    </div></div></div></div>

</div>

<script>
    database = firebase.database();

    function publishOffer() {
        const text = document.getElementById('offer_text').value.trim();
        if(!text) return;
        database.ref('AlTamim_Offers/current').set({ text: text }).then(() => { alert("تم النشر!"); document.getElementById('offer_text').value = ""; });
    }

    function deleteOffer() { if(confirm("حذف؟")) database.ref('AlTamim_Offers/current').remove(); }

    // دالة سحرية لفك التشفير وبناء جدول الأصناف داخل كارت الأدمن بالملي
    function parseOrderDetailsToTable(rawDetails) {
        let htmlTable = `
            <table class="admin-table-view">
                <thead>
                    <tr><th>الصنف</th><th>الكمية</th><th>ملحوظة</th></tr>
                </thead>
                <tbody>
        `;
        
        try {
            const rows = rawDetails.split('[ROW]');
            rows.forEach(row => {
                const parts = row.split('[SPLIT]');
                if(parts.length >= 2) {
                    htmlTable += `<tr><td>${parts[0]}</td><td><span class="badge bg-secondary">${parts[1]}</span></td><td><small>${parts[2] || 'لا يوجد'}</small></td></tr>`;
                }
            });
        } catch(e) {
            htmlTable += `<tr><td colspan="3">${rawDetails}</td></tr>`;
        }

        htmlTable += `</tbody></table>`;
        return htmlTable;
    }

    database.ref('AlTamim_Orders').on('value', (snapshot) => {
        const allOrders = snapshot.val();
        const containers = {
            pending: document.getElementById('new_orders_container'),
            confirmed: document.getElementById('confirmed_orders_container'),
            delivered: document.getElementById('delivered_orders_container')
        };
        
        Object.keys(containers).forEach(k => containers[k].innerHTML = "");
        let counts = { pending: 0, confirmed: 0 };
        let clientStats = {};

        if(!allOrders) { updateBadges(0,0); return; }

        const sorted = Object.keys(allOrders).map(key => ({ id: key, ...allOrders[key] })).sort((a,b) => b.timestamp - a.timestamp);

        sorted.forEach(order => {
            const timeStr = new Date(order.timestamp).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
            
            // حساب وإعداد جدول تفاصيل الطلب المتفصل
            const tableHTML = parseOrderDetailsToTable(order.order_details);

            const card = document.createElement('div');
            card.className = "col-md-6 col-lg-4";
            card.innerHTML = `
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <small class="text-muted"><i class="bi bi-clock me-1"></i>${timeStr}</small>
                        <span class="badge ${order.status==='pending'?'bg-danger':order.status==='confirmed'?'bg-warning text-dark':'bg-success'} rounded-pill">${order.status==='pending'?'جديد':order.status==='confirmed'?'مؤكد':'تم التوصيل'}</span>
                    </div>
                    <h5 class="fw-bold text-white mb-1"><i class="bi bi-person me-1 text-warning"></i>${order.client_name}</h5>
                    <p class="mb-2"><i class="bi bi-telephone me-1 text-success"></i><a href="tel:${order.client_phone}" class="text-success text-decoration-none fw-bold">${order.client_phone}</a></p>
                    
                    <div class="mb-3">
                        <label class="text-muted small fw-bold mb-1">📋 جدول الأصناف المطلوبة:</label>
                        ${tableHTML}
                    </div>
                    <div class="mb-3">
                        <label class="text-muted small fw-bold mb-1">📍 العنوان:</label>
                        <p class="text-white-50 bg-dark p-2 rounded small border border-secondary mb-0">${order.detailed_address}</p>
                    </div>
                    <div class="pt-2 border-top border-secondary">
                        ${getButtonsByStatus(order.id, order.status)}
                    </div>
                </div>
            `;

            if(containers[order.status]) {
                containers[order.status].appendChild(card);
                if(order.status in counts) counts[order.status]++;
                
                // تجميع حساب أبرز العملاء لكل الطلبات في السيرفر
                const cKey = order.client_name + "_" + order.client_phone;
                if(!clientStats[cKey]) clientStats[cKey] = { name: order.client_name, phone: order.client_phone, count: 0 };
                clientStats[cKey].count++;
            }
        });

        updateBadges(counts.pending, counts.confirmed);
        renderTopClients(clientStats);
    });

    function getButtonsByStatus(id, status) {
        if(status === 'pending') {
            return `<button class="btn btn-success btn-sm w-100 fw-bold mb-2" onclick="changeStatus('${id}', 'confirmed')">✔️ تأكيد الأوردر ونقله</button>
                    <button class="btn btn-outline-danger btn-sm w-100" onclick="deleteOrder('${id}')">حذف</button>`;
        } else if(status === 'confirmed') {
            return `<button class="btn btn-warning btn-sm w-100 text-dark fw-bold mb-2" onclick="changeStatus('${id}', 'delivered')">🛵 تم التوصيل بالكامل ✅</button>
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="changeStatus('${id}', 'pending')">إلغاء التأكيد</button>`;
        } else {
            return `<div class="text-center text-success small fw-bold"><i class="bi bi-check2-all me-1"></i>الأوردر في السجل ومحفوظ ومقفل</div>`;
        }
    }

    function changeStatus(id, nextStatus) { database.ref('AlTamim_Orders/' + id).update({ status: nextStatus }); }
    function deleteOrder(id) { if(confirm("حذف؟")) database.ref('AlTamim_Orders/' + id).remove(); }
    function updateBadges(n, c) { document.getElementById('new_count').innerText = n; document.getElementById('confirmed_count').innerText = c; }

    function renderTopClients(stats) {
        const container = document.getElementById('clients_container'); container.innerHTML = "";
        const sorted = Object.keys(stats).map(k => stats[k]).sort((a,b) => b.count - a.count);
        sorted.forEach((c, idx) => {
            const div = document.createElement('div'); div.className = "top-client-row";
            div.innerHTML = `<div><span class="fw-bold text-white">${idx===0?'🥇 ':idx===1?'🥈 ':idx===2?'🥉 ':''}${c.name}</span><br><small class="text-muted">${c.phone}</small></div>
                             <div><span class="badge bg-warning text-dark px-3 py-2 rounded-pill fw-bold">${c.count} أوردرات</span></div>`;
            container.appendChild(div);
        });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
