<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق التميم - طلب جديد</title>
    <!-- استدعاء خط فريدم وشبكة بوتست랩 للتصميم الاحترافي -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card-order {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0d6efd, #0046b5);
            border: none;
            border-radius: 8px;
            padding: 12px;
        }
        .btn-success {
            background: linear-gradient(135deg, #198754, #115f3a);
            border: none;
            border-radius: 8px;
            padding: 12px;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #ced4da;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
        .location-status {
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <!-- الهيدر أو شعار التطبيق -->
    <div class="text-center mb-4">
        <h2 class="fw-bold text-primary">التميم للخدمات</h2>
        <p class="text-muted">سجل بياناتك واطلب بكل سهولة</p>
    </div>

    <!-- كارت تسجيل الطلب -->
    <div class="card card-order p-4 mb-4">
        <h4 class="mb-3 fw-bold text-dark"><i class="bi bi-cart3 me-2"></i>تفاصيل الطلب</h4>
        
        <form id="orderForm">
            <!-- اسم العميل -->
            <div class="mb-3">
                <label for="clientName" class="form-label fw-semibold">اسم العميل :</label>
                <input type="text" class="form-control" id="clientName" placeholder="اكتب اسمك الثلاثي" required>
            </div>

            <!-- رقم الهاتف -->
            <div class="mb-3">
                <label for="clientPhone" class="form-label fw-semibold">رقم الهاتف :</label>
                <input type="tel" class="form-control" id="clientPhone" placeholder="رقم الموبايل للتواصل" required>
            </div>

            <!-- تفاصيل الطلبات -->
            <div class="mb-3">
                <label for="orderDetails" class="form-label fw-semibold">ما هي طلباتك؟</label>
                <textarea class="form-control" id="orderDetails" rows="4" placeholder="اكتب المنتجات أو الخدمات التي تحتاجها بالتفصيل..." required></textarea>
            </div>

            <!-- تحديد الموقع الجغرافي (اللايف لوكيشن) -->
            <div class="mb-4">
                <label class="form-label fw-semibold">تحديد موقع التوصيل :</label>
                <button type="button" class="btn btn-outline-secondary w-100" id="getLocationBtn">
                    <i class="bi bi-geo-alt-fill me-2"></i>اضغط لتحديد موقعك الحالي تلقائياً
                </button>
                <div id="locationStatus" class="location-status text-muted text-center mt-2">الموقع لم يحدد بعد</div>
                
                <!-- حقول مخفية لحفظ الإحداثيات وإرسالها لقاعدة البيانات -->
                <input type="hidden" id="latitude">
                <input type="hidden" id="longitude">
            </div>

            <!-- زر إرسال الطلب -->
            <button type="submit" class="btn btn-success w-100 fw-bold fs-5">
                <i class="bi bi-check-circle me-2"></i>إرسال الطلب الآن
            </button>
        </form>
    </div>
</div>

<!-- كود الجافا سكريبت لتشغيل اللوكيشن وإرسال البيانات -->
<script>
    // 1. كود تحديد الموقع الجغرافي (Live Location)
    document.getElementById('getLocationBtn').addEventListener('click', function() {
        const statusText = document.getElementById('locationStatus');
        const latInput = document.getElementById('latitude');
        const lngInput = document.getElementById('longitude');

        if (!navigator.geolocation) {
            statusText.innerText = "❌ متصفحك لا يدعم تحديد الموقع الجغرافي.";
            statusText.className = "location-status text-danger text-center";
            return;
        }

        statusText.innerText = "⏳ جاري تحديد موقعك بدقة، انتظر ثواني...";
        statusText.className = "location-status text-warning text-center";

        // خيارات لجلب الموقع بأعلى دقة ممكنة High Accuracy
        const options = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };

        navigator.geolocation.getCurrentPosition(
            // حالة النجاح
            function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                latInput.value = lat;
                lngInput.value = lng;

                statusText.innerText = `✅ تم تحديد الموقع بنجاح! (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
                statusText.className = "location-status text-success text-center";
                document.getElementById('getLocationBtn').className = "btn btn-success w-100";
            },
            // حالة الخطأ أو رفض العميل للصلاحية
            function(error) {
                console.error(error);
                statusText.className = "location-status text-danger text-center";
                if (error.code === error.PERMISSION_DENIED) {
                    statusText.innerText = "❌ تم رفض إذن الوصول للموقع. يرجى تفعيله من إعدادات الهاتف.";
                } else {
                    statusText.innerText = "❌ فشل تحديد الموقع، تأكد من تشغيل الـ GPS وجرب مرة أخرى.";
                }
            }, 
            options
        );
    });

    // 2. كود التعامل مع الفورم وإرسال البيانات (هنا هتربطه بالفيربيز Firebase بتاعك)
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;
        const details = document.getElementById('orderDetails').value;
        const lat = document.getElementById('latitude').value;
        const lng = document.getElementById('longitude').value;

        // تجهيز بيانات الأوردر في كائن (Object)
        const orderData = {
            clientName: name,
            clientPhone: phone,
            orderDetails: details,
            location: {
                latitude: lat || "لم يحدد العميل موقعه",
                longitude: lng || "لم يحدد العميل موقعه"
            },
            timestamp: new Date().toISOString()
        };

        console.log("بيانات الطلب الجاهزة للإرسال:", orderData);

        // ⚠️ هنا يا أسامة هتحط كود الفيربيز بتاعك اللي بيعمل push للـ orderData جوه الـ Database
        // مثال: firebase.database().ref('orders').push(orderData);

        alert("تم استلام طلبك بنجاح وجاري تحويله للأدمن! شكراً لك.");
        document.getElementById('orderForm').reset();
        document.getElementById('locationStatus').innerText = "الموقع لم يحدد بعد";
        document.getElementById('locationStatus').className = "location-status text-muted text-center";
        document.getElementById('getLocationBtn').className = "btn btn-outline-secondary w-100";
    });
</script>

</body>
</html>
