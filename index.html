<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>آل تميم - طلبات</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body style="background:#0b0f19; color:white; padding:20px;">

<div class="container">
    <div id="offer_banner" class="alert alert-warning" style="display:none;"></div>
    
    <ul class="nav nav-pills mb-3">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#order_tab">طلب أوردر</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#status_tab">حالة الطلب</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#history_tab">السجل</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="order_tab">
            <input type="text" id="name" class="form-control mb-2" placeholder="الاسم">
            <input type="text" id="phone" class="form-control mb-2" placeholder="رقم الهاتف">
            <textarea id="details" class="form-control mb-2" placeholder="اكتب الأصناف (صنف - كمية - ملحوظة)"></textarea>
            <input type="text" id="address" class="form-control mb-2" placeholder="العنوان">
            <button class="btn btn-primary w-100" onclick="sendOrder()">إرسال الطلب</button>
        </div>
        <div class="tab-pane fade" id="status_tab">
            <div id="status_view">انتظر تحميل حالة الطلب...</div>
        </div>
        <div class="tab-pane fade" id="history_tab">
            <div id="history_view"></div>
        </div>
    </div>
</div>

<script>
    // --- ضع هنا بيانات مشروعك من Firebase ---
    const firebaseConfig = {
        apiKey: "AIza...",
        authDomain: "...",
        databaseURL: "...",
        projectId: "...",
        storageBucket: "...",
        messagingSenderId: "...",
        appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function sendOrder() {
        const orderData = {
            client_name: document.getElementById('name').value,
            client_phone: document.getElementById('phone').value,
            order_details: document.getElementById('details').value,
            detailed_address: document.getElementById('address').value,
            status: "pending",
            timestamp: Date.now()
        };
        const newRef = db.ref('AlTamim_Orders').push();
        newRef.set(orderData);
        localStorage.setItem('last_order', newRef.key);
        alert("تم الإرسال!");
    }

    db.ref('AlTamim_Orders').on('value', snap => {
        const orders = snap.val();
        const lastKey = localStorage.getItem('last_order');
        if(lastKey && orders[lastKey]) {
            document.getElementById('status_view').innerText = "الحالة: " + orders[lastKey].status;
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
