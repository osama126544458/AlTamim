<style>
:root {
    --gold: #C9A961;
    --gold-light: #E4D3A3;
    --dark-bg: #0b0f19;
    --card-bg: rgba(20, 27, 45, 0.7);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-light: #f8f9fa;
    --text-muted: #a0aec0;
}

* {
    font-family: 'Cairo', sans-serif;
}

body {
    background-color: var(--dark-bg);
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(11, 61, 145, 0.3) 0%, transparent 45%),
        radial-gradient(circle at 90% 80%, rgba(201, 169, 97, 0.1) 0%, transparent 45%);
    min-height: 100vh;
    color: var(--text-light);
    position: relative;
    overflow-x: hidden;
}

.main-wrapper {
    position: relative;
    z-index: 1;
    padding: 2rem 0;
}

/* Header */
.brand-header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeInDown 0.8s ease;
}

.logo-wrapper {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 90px;
    height: 90px;
    background: linear-gradient(135deg, #0B3D91 0%, #1353bd 100%);

    border-radius: 24px;
    margin-bottom: 1.25rem;
    box-shadow: 0 15px 35px rgba(11, 61, 145, 0.5);
}

.logo-wrapper i {
    font-size: 2.5rem;
    color: var(--gold);
}

.brand-title {
    font-size: 2.3rem;
    font-weight: 900;
    color: #fff;
    margin-bottom: 0.25rem;
}

.brand-tagline {
    font-size: 1rem;
    color: var(--gold-light);
    font-weight: 600;
    background: rgba(201, 169, 97, 0.1);
    display: inline-block;
    padding: 0.2rem 1rem;
    border-radius: 50px;
    border: 1px solid rgba(201, 169, 97, 0.2);
}

/* Dark Glassmorphism Card */
.glass-card {
    background: var(--card-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
    animation: fadeInUp 0.8s ease 0.1s both;
}

.card-title {
    color: #fff;
    font-weight: 700;
    font-size: 1.4rem;
    margin-bottom: 1.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 0.75rem;
}

.card-title i {
    color: var(--gold);
}

/* Form inputs in Dark Theme */
.form-label {
    color: #e2e8f0;
    font-weight: 600;
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
}

.form-control, textarea {
    background: rgba(15, 22, 38, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 0.8rem 1.25rem;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    color: #fff;
}

.form-control:focus, textarea:focus {
    background: #0f1626;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.25);
    color: #fff;
}

.form-control::placeholder, textarea::placeholder {
    color: #64748b;
}

.input-group {
    position: relative;
}

.input-group .form-control {
    padding-right: 3rem;
}

.input-icon {
    position: absolute;
    right: 1.2rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 1.1rem;
    z-index: 5;
}

textarea.form-control {
    min-height: 100px;
}

/* Submit Button */
.btn-submit {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border: none;
    color: #0b0f19;
    font-weight: 700;
    font-size: 1.1rem;
    padding: 0.9rem 2rem;
    border-radius: 14px;
    width: 100%;
    box-shadow: 0 8px 25px rgba(201, 169, 97, 0.3);
    transition: all 0.3s ease;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(201, 169, 97, 0.45);
}

/* Success Alert */
.alert-success-custom {
    background: rgba(16, 185, 129, 0.15);
    border: 1px solid rgba(16, 185, 129, 0.3);
    border-radius: 14px;
    color: #34d399;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: none;
}

.alert-success-custom.show {
    display: block;
}

/* WhatsApp Floating Button */
.whatsapp-btn {
    position: fixed;
    bottom: 25px;
    left: 25px;
    background-color: #25D366;
    color: white;
    border-radius: 50px;
    padding: 10px 20px;
    font-weight: 700;
    font-size: 0.95rem;
    box-shadow: 0 8px 24px rgba(37, 211, 102, 0.4);
    z-index: 999;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
    border: 2px solid rgba(255, 255, 255, 0.2);
}

.whatsapp-btn:hover {
    background-color: #20ba5a;
    transform: scale(1.05) translateY(-3px);
    color: white;
}

.whatsapp-btn i {
    font-size: 1.4rem;
}

/* Features */
.feature-badge {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 14px;
    padding: 1rem;
    text-align: center;
    height: 100%;
}

.feature-badge i {
    font-size: 1.7rem;
    color: var(--gold);
    margin-bottom: 0.4rem;
    display: block;
}

.feature-badge span {
    font-size: 0.85rem;
    color: var(--text-muted);
}

/* Footer */
.footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    text-align: center;
    color: rgba(255, 255, 255, 0.4);
    font-size: 0.85rem;
}

@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 576px) {
    .glass-card { padding: 1.5rem; border-radius: 20px; }
    .brand-title { font-size: 1.9rem; }
    .whatsapp-btn { bottom: 15px; left: 15px; padding: 8px 15px; font-size: 0.85rem; }
}
</style>
</head>

    <i class="bi bi-whatsapp"></i>

<div class="main-wrapper">
    <div class="container">
        
        <!-- Header -->
        <header class="brand-header">
            <div class="logo-wrapper">
                <i class="bi bi-bicycle"></i>
            </div>
            <h1 class="brand-title">آل تميم للتوصيل</h1>
            <p class="brand-tagline"><i class="bi bi-geo-alt-fill me-1"></i> خدمة التوصيل داخل طنطا فقط</p>
        </header>

        <!-- Main Form Card -->
        <div class="row justify-content-center">
            <div class="col-lg-7 col-md-9">
                <div class="glass-card">
                    
                    <div id="successAlert" class="alert-success-custom">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <strong>تم إرسال طلبك بنجاح!</strong> جاري المراجعة والتنفيذ الآن.

                    <h2 class="card-title">

                    </h2>

                    <form id="orderForm" novalidate>
                        <!-- Client Name -->
                        <div class="mb-3">
                            <label for="clientName" class="form-label">الاسم</label>

                                <i class="bi bi-person input-icon"></i>
                            </div>
                        </div>

                        <!-- Phone Number -->
                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label">رقم الهاتف</label>
                            <div class="input-group">
                                <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" required placeholder="01xxxxxxxxx" dir="ltr">
                                <i class="bi bi-phone input-icon"></i>
                            </div>
                        </div>

                        <!-- Manual Address Entry -->
                        <div class="mb-3">
                            <label for="clientAddress" class="form-label">العنوان بالتفصيل (داخل طنطا)</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="clientAddress" name="clientAddress" required placeholder="اسم الشارع، الدور، علامة مميزة (مثال: شارع سعيد)">
                                <i class="bi bi-geo-alt input-icon"></i>

                        <!-- Order Details -->

                        <!-- Optional Google Maps Link -->

                <!-- Info Badges -->
                <div class="mt-4">

            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div>© 2026 آل تميم للتوصيل - طنطا</div>

</div>

<!-- Firebase Config -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, push, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

    const firebaseConfig = {
        databaseURL: "https://vnom-gym-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.firebaseDB = { db, ref, push, serverTimestamp };
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('orderForm');
    const successAlert = document.getElementById('successAlert');
    
    if(localStorage.getItem('clientName')) { document.getElementById('clientName').value = localStorage.getItem('clientName'); }
    if(localStorage.getItem('phoneNumber')) { document.getElementById('phoneNumber').value = localStorage.getItem('phoneNumber'); }

    function validatePhone(phone) {
        return /^01[0-2,5]{1}[0-9]{8}$/.test(phone.replace(/\s|-/g, ''));
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        successAlert.classList.remove('show');

        const name = document.getElementById('clientName').value.trim();
        const phone = document.getElementById('phoneNumber').value.trim();
        const address = document.getElementById('clientAddress').value.trim();
        const details = document.getElementById('orderDetails').value.trim();
        const mapUrl = document.getElementById('mapsLink').value.trim();

        let isValid = true;

        if(!name) { document.getElementById('clientName').classList.add('is-invalid'); isValid = false; }
        else { document.getElementById('clientName').classList.remove('is-invalid'); }

        if(!validatePhone(phone)) { document.getElementById('phoneNumber').classList.add('is-invalid'); isValid = false; }
        else { document.getElementById('phoneNumber').classList.remove('is-invalid'); }

        if(!address) { document.getElementById('clientAddress').classList.add('is-invalid'); isValid = false; }
        else { document.getElementById('clientAddress').classList.remove('is-invalid'); }

        if(!details) { document.getElementById('orderDetails').classList.add('is-invalid'); isValid = false; }
        else { document.getElementById('orderDetails').classList.remove('is-invalid'); }

        if(!isValid) return;

        localStorage.setItem('clientName', name);
        localStorage.setItem('phoneNumber', phone);

        // الحل السحري: دمج العنوان واللوكيشن اليدوي جوه الخانة اللي الأدمن بيقرأها إجباري
        // مع تمرير إحداثيات ثابتة عشان الخريطة عند الأدمن متقفلش أو تضرب
        const finalOrderDetails = `📍 العنوان: ${address}\n📦 الطلب: ${details}\n🔗 رابط ماب: ${mapUrl ? mapUrl : 'غير مرفق'}`;

        const orderPayload = {
            clientName: name,
            phoneNumber: phone,
            orderDetails: finalOrderDetails, // مدمج فيه كل تفاصيل العنوان والطلب
            latitude: 30.7865,               // إحداثيات وسط طنطا عشان الأدمن يقبلها
            longitude: 31.0004,              // إحداثيات وسط طنطا عشان الأدمن يقبلها
            accuracy: 10,
            status: 'pending',
            createdAt: new Date().toISOString()
        };

        try {
            if (window.firebaseDB) {
                const { db, ref, push, serverTimestamp } = window.firebaseDB;
                orderPayload.timestamp = serverTimestamp();
                
                // الرفع المباشر في الـ node الأصلي "orders"
                await push(ref(db, 'orders'), orderPayload);
                console.log('Order sent safely to admin structure!');
            }
        } catch (error) {
            console.error('Firebase Delivery Error:', error);
            alert('حدث خطأ أثناء الإرسال، يمكنك طلب الدعم الفني مباشرة عبر الواتساب.');
            return;
        }

        // تفريغ الحقول
        document.getElementById('clientAddress').value = '';
        document.getElementById('orderDetails').value = '';
        document.getElementById('mapsLink').value = '';
        
        successAlert.classList.add('show');
        successAlert.scrollIntoView({ behavior: 'smooth', block: 'center' });

        setTimeout(() => { successAlert.classList.remove('show'); }, 4000);
    });
});
</script>
</body>
