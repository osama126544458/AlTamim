<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آل تميم - طلب أوردر</title>
    
    <!-- سكريبتات الفيربيز الخاصة بمشروعك الحالي -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Bootstrap 5.3 RTL & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #C9A961; --dark-bg: #0b0f19; }
        * { font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark-bg); color: #f8f9fa; min-height: 100vh; padding: 1.5rem 0; }
        .glass-card { background: rgba(20, 27, 45, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 1.5rem; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5); }
        .form-control { background: #0f1626; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: #fff; padding: 0.5rem 0.75rem; font-size: 0.9rem; }
        .form-control:focus { background: #0f1626; border-color: var(--gold); color: #fff; box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.25); }
        .btn-submit { background: linear-gradient(135deg, var(--gold) 0%, #E4D3A3 100%); border: none; color: #0b0f19; font-weight: 700; width: 100%; padding: 0.75rem; border-radius: 12px; }
        .offer-banner { background: var(--gold); color: #0b0f19; padding: 10px; text-align: center; font-weight: bold; border-radius: 10px; margin-bottom: 15px; display: none; }
        .status-box { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; text-align: center; font-weight: bold; }
        
        /* استايل الجدول */
        .table-items { width: 100%; margin-bottom: 10px; }
        .table-items th { color: var(--gold); font-size: 0.9rem; padding-bottom: 8px; text-align: center; }
        .table-items td { padding: 4px; vertical-align: middle; }
        .btn-add-row { background: transparent; border: 1px dashed var(--gold); color: var(--gold); font-size: 0.85rem; padding: 5px 15px; border-radius: 8px; width: 100%; transition: 0.3s; }
        .btn-add-row:hover { background: rgba(201, 169, 97, 0.1); }
        .btn-delete-row { background: rgba(220, 53, 69, 0.2); border: 1px solid #dc3545; color: #dc3545; border-radius: 8px; padding: 5px 10px; }
        .btn-delete-row:hover { background: #dc3545; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <!-- بنر العروض التلقائي من قاعدة البيانات -->
            <div id="offer_banner" class="offer-banner"></div>

            <div class="text-center mb-4">
                <h1 class="fw-bold text-white">آل تميم للتوصيل</h1>
                <small style="color: var(--gold)">طنطا - داخل طنطا فقط</small>
            </div>

            <div class="glass-card">
                <form id="orderForm" onsubmit="event.preventDefault(); sendOrder();">
                    <div class="mb-3">
                        <label class="form-label fw-bold">اسم العميل:</label>
                        <input type="text" class="form-control" id="name_input" required placeholder="اكتب اسمك بالكامل">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">رقم الهاتف:</label>
                        <input type="tel" class="form-control" id="phone_input" required placeholder="اكتب رقم تليفونك" dir="ltr">
                    </div>

                    <!-- جدول تفاصيل الطلب الجديد -->
                    <div class="p-3 mb-3 rounded" style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);">
                        <label class="form-label fw-bold text-white mb-2"><i class="bi bi-list-stars me-1" style="color:var(--gold)"></i> تفاصيل الطلب (جدول الأصناف):</label>
                        
                        <table class="table-items">
                            <thead>
                                <tr>
                                    <th style="width: 40%;">الصنف</th>
                                    <th style="width: 25%;">الكمية</th>
                                    <th style="width: 25%;">ملحوظة</th>
                                    <th style="width: 10%;"></th>
                                </tr>
                            </thead>
                            <tbody id="items_tbody">
                                <!-- السطر الأول الافتراضي -->
                                <tr>
                                    <td><input type="text" class="form-control row-item" required placeholder="مثال: فرخ مشوي"></td>
                                    <td><input type="text" class="form-control row-qty" required placeholder="وزن / عدد"></td>
                                    <td><input type="text" class="form-control row-note" placeholder="اختياري"></td>
                                    <td class="text-center"><button type="button" class="btn-delete-row" onclick="deleteRow(this)"><i class="bi bi-trash3"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                        
                        <button type="button" class="btn-add-row" onclick="addNewRow()"><i class="bi bi-plus-circle me-1"></i> إضافة صنف آخر للأوردر</button>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">العنوان بالتفصيل داخل طنطا:</label>
                        <input type="text" class="form-control" id="address_input" required placeholder="اسم الشارع - الدور - علامة مميزة">
                    </div>

                    <button type="submit" id="send_btn" class="btn-submit">🚀 إرسال الطلب للأدمن</button>
                </form>

                <!-- صندوق تتبع الحالة للمستهلك -->
                <div id="status_div" class="status-box" style="display:none;">
                    حالة الأوردر الحالية: <span id="order_status" style="color: #ffc107;">في انتظار التأكيد...</span>
                    <button id="cancel_btn" class="btn btn-danger btn-sm w-100 mt-2" style="display:none;" onclick="cancelOrder()">❌ إلغاء الأوردر</button>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    // الإعدادات الرسمية لمشروعك (آل تميم)
    const firebaseConfig = {
        apiKey: "AIzaSyCqgpR6RkmGDMKeLZcYpJP43-8W_NePTBg",
        authDomain: "altamim-project.firebaseapp.com",
        databaseURL: "https://altamim-project-default-rtdb.firebaseio.com",
        projectId: "altamim-project",
        storageBucket: "altamim-project.firebasestorage.app",
        messagingSenderId: "24194456334",
        appId: "1:24194456334:web:9ea26ffb015b625912555f",
        measurementId: "G-T2XWZ3757B"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentOrderKey = null;

    // جلب بنر العروض حياً
    database.ref('AlTamim_Offers/current').on('value', (snapshot) => {
        const offer = snapshot.val();
        const banner = document.getElementById('offer_banner');
        if(offer && offer.text) {
            banner.innerText = "🔥 عرض جديد: " + offer.text;
            banner.style.display = "block";
        } else {
            banner.style.display = "none";
        }
    });

    // وظيفة إضافة سطر جديد للجدول
    function addNewRow() {
        const tbody = document.getElementById('items_tbody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="form-control row-item" required placeholder="اسم الصنف"></td>
            <td><input type="text" class="form-control row-qty" required placeholder="الكمية"></td>
            <td><input type="text" class="form-control row-note" placeholder="اختياري"></td>
            <td class="text-center"><button type="button" class="btn-delete-row" onclick="deleteRow(this)"><i class="bi bi-trash3"></i></button></td>
        `;
        tbody.appendChild(tr);
    }

    // وظيفة مسح سطر من الجدول
    function deleteRow(btn) {
        const tbody = document.getElementById('items_tbody');
        if(tbody.rows.length > 1) {
            btn.closest('tr').remove();
        } else {
            alert("يجب أن يحتوي الأوردر على صنف واحد على الأقل!");
        }
    }

    // إرسال الطلب للأدمن
    function sendOrder() {
        const name = document.getElementById('name_input').value.trim();
        const phone = document.getElementById('phone_input').value.trim();
        const address = document.getElementById('address_input').value.trim();
        
        // تجميع بيانات الجدول بالكامل
        const items = document.getElementsByClassName('row-item');
        const qtys = document.getElementsByClassName('row-qty');
        const notes = document.getElementsByClassName('row-note');
        
        let combinedDetails = "";
        
        for(let i = 0; i < items.length; i++) {
            let itemText = items[i].value.trim();
            let qtyText = qtys[i].value.trim();
            let noteText = notes[i].value.trim();
            
            if(itemText && qtyText) {
                combinedDetails += `🔹 صنف: ${itemText} [كمية: ${qtyText}]`;
                if(noteText) {
                    combinedDetails += ` (ملحوظة: ${noteText})`;
                }
                if(i < items.length - 1) {
                    combinedDetails += " \n "; // نزول سطر جديد لكل صنف عشان يظهر منظم عند الأدمن
                }
            }
        }

        if(!name || !phone || !combinedDetails || !address) {
            alert("برجاء ملء جميع الخانات المطلوبة!");
            return;
        }

        const orderRef = database.ref('AlTamim_Orders').push();
        currentOrderKey = orderRef.key;

        // الهيكل المتوافق 100% مع لوحة تحكم الأدمن في السكتشوار
        const orderData = {
            order_id: currentOrderKey,
            client_name: name,
            client_phone: phone,
            order_details: combinedDetails, 
            detailed_address: address,
            location_link: "", 
            status: "pending",
            timestamp: Date.now()
        };

        orderRef.set(orderData).then(() => {
            alert("تم إرسال أوردرك بنجاح!");
            document.getElementById('send_btn').disabled = true;
            document.getElementById('status_div').style.display = "block";
            document.getElementById('cancel_btn').style.display = "block";
            listenToOrderStatus();
        });
    }

    // الاستماع لتحديثات حالة الطلب من الأدمن
    function listenToOrderStatus() {
        database.ref('AlTamim_Orders/' + currentOrderKey).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('order_status').innerText = data.status === "pending" ? "في انتظار التأكيد..." : "تم تأكيد طلبك وجاري التوصيل! ✅";
                if(data.status !== "pending") {
                    document.getElementById('cancel_btn').style.display = "none";
                    document.getElementById('order_status').style.color = "#28a745";
                }
            } else {
                document.getElementById('order_status').innerText = "تم إلغاء الأوردر أو حذفه.";
                document.getElementById('cancel_btn').style.display = "none";
                document.getElementById('order_status').style.color = "#dc3545";
            }
        });
    }

    // إلغاء الطلب من طرف العميل
    function cancelOrder() {
        if(confirm("هل أنت متأكد من إلغاء هذا الأوردر؟")) {
            database.ref('AlTamim_Orders/' + currentOrderKey).remove().then(() => {
                alert("تم إلغاء الأوردر بنجاح.");
                location.reload();
            });
        }
    }
</script>
</body>
</html>
