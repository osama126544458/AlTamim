// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<style>
:root {
    --gold: #C9A961;
    --gold-light: #E4D3A3;
    --deep-blue: #0B3D91;
    --deep-blue-dark: #072a66;
    --text-dark: #1a1a1a;
    --text-muted: #6c757d;
    --glass-bg: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.2);
}

* {
    font-family: 'Cairo', sans-serif;
}

body {
    background: linear-gradient(135deg, #0B3D91 0%, #0a2f6b 50%, #072a66 100%);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 20%, rgba(201, 169, 97, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(201, 169, 97, 0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
}

.main-wrapper {
    position: relative;
    z-index: 1;
    padding: 2rem 0;
}

/* Header */
.brand-header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeInDown 0.8s ease;
}

.logo-wrapper {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius: 24px;
    margin-bottom: 1.5rem;
    box-shadow: 0 20px 40px rgba(201, 169, 97, 0.3), 
                0 0 60px rgba(201, 169, 97, 0.2);
    position: relative;
}

.logo-wrapper::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius: 24px;
    filter: blur(10px);
    opacity: 0.5;
    z-index: -1;
}

.logo-wrapper i {
    font-size: 3rem;
    color: var(--deep-blue);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

.brand-title {
    font-size: 2.5rem;
    font-weight: 900;
    color: #fff;
    margin-bottom: 0.5rem;
    letter-spacing: -0.5px;
}

.brand-tagline {
    font-size: 1.1rem;
    color: var(--gold-light);
    font-weight: 400;
}

/* Glassmorphism Card */
.glass-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),

}

.card-title {
    color: #fff;
    font-weight: 700;
    font-size: 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.card-title i {
    color: var(--gold);
}

/* Form Elements */
.form-label {
    color: var(--gold-light);
    font-weight: 600;
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
}

.form-control, .form-select, textarea {
    background: rgba(255, 255, 255, 0.95);
    border: 2px solid rgba(201, 169, 97, 0.3);
    border-radius: 14px;
    padding: 0.875rem 1.25rem;
    font-size: 1rem;
    transition: all 0.3s ease;
    color: var(--text-dark);
}

.form-control:focus, .form-select:focus, textarea:focus {
    background: #fff;
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(201, 169, 97, 0.15);

}

.input-group {
    position: relative;
}

.input-group .form-control {
    padding-right: 3rem;
}

.input-icon {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 1.2rem;
    z-index: 5;
    pointer-events: none;
}

textarea.form-control {
    min-height: 120px;
    resize: vertical;
}

/* Location Button */
.location-btn {
    background: rgba(201, 169, 97, 0.15);
    border: 2px dashed var(--gold);
    color: var(--gold-light);
    padding: 1rem;
    border-radius: 14px;
    width: 100%;
    font-weight: 600;
    transition: all 0.3s ease;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
}

.location-btn:hover {
    background: rgba(201, 169, 97, 0.25);
    border-style: solid;
    transform: translateY(-2px);
}

.location-btn.success {
    background: rgba(25, 135, 84, 0.2);
    border-color: #198754;
    border-style: solid;
    color: #75d9a5;
}

.location-btn.loading {
    pointer-events: none;
    opacity: 0.7;
}

.location-status {
    margin-top: 0.75rem;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    font-size: 0.9rem;
    display: none;
    animation: fadeIn 0.3s ease;
}

.location-status.show {
    display: block;
}

.location-status.success {
    background: rgba(25, 135, 84, 0.2);
    color: #75d9a5;
    border: 1px solid rgba(25, 135, 84, 0.3);
}

.location-status.error {
    background: rgba(220, 53, 69, 0.2);
    color: #ff8b9a;
    border: 1px solid rgba(220, 53, 69, 0.3);
}

.location-status.info {
    background: rgba(201, 169, 97, 0.15);
    color: var(--gold-light);
    border: 1px solid rgba(201, 169, 97, 0.3);
}

/* Submit Button */
.btn-submit {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border: none;
    color: var(--deep-blue);
    font-weight: 700;
    font-size: 1.1rem;
    padding: 1rem 2rem;
    border-radius: 16px;
    width: 100%;

    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.btn-submit::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s ease;
}

.btn-submit:hover::before {
    left: 100%;
}

.btn-submit:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(201, 169, 97, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

.btn-submit:active {
    transform: translateY(-1px);
}

/* Feature Badges */
.features-grid {
    margin-top: 2.5rem;
    animation: fadeInUp 0.8s ease 0.4s both;
}

.feature-badge {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(201, 169, 97, 0.2);
    border-radius: 16px;
    padding: 1.25rem;
    text-align: center;
    transition: all 0.3s ease;
    height: 100%;
}

.feature-badge:hover {
    background: rgba(201, 169, 97, 0.1);
    border-color: var(--gold);
    transform: translateY(-5px);
}

.feature-badge i {
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 0.5rem;
    display: block;
}

.feature-badge span {
    color: #fff;
    font-weight: 600;
    font-size: 0.95rem;
}

/* Success Alert */
.alert-success-custom {
    background: rgba(25, 135, 84, 0.15);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(25, 135, 84, 0.3);
    border-radius: 16px;
    color: #75d9a5;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: none;
    animation: slideDown 0.4s ease;
}

.alert-success-custom.show {
    display: block;
}

/* Footer */
.footer {
    margin-top: 4rem;
    padding: 2rem 0 1rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
}

.footer-text {
    color: rgba(255, 255, 255, 0.7);
    font-size: 0.95rem;
}

/* Animations */
@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.spinner-border-sm {
    width: 1rem;
    height: 1rem;
    border-width: 0.15em;
}

/* Mobile Responsive */
@media (max-width: 576px) {
    .glass-card {
        padding: 1.5rem;
        border-radius: 20px;
    }
    
    .brand-title {
        font-size: 2rem;
    }
    
    .logo-wrapper {
        width: 80px;
        height: 80px;
    }
    
    .logo-wrapper i {
        font-size: 2.5rem;
    }
    
    .main-wrapper {
        padding: 1rem 0;
    }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('orderForm');
    const locationBtn = document.getElementById('locationBtn');
    const locationBtnText = document.getElementById('locationBtnText');
    const locationStatus = document.getElementById('locationStatus');
    const successAlert = document.getElementById('successAlert');
    
    let locationAcquired = false;

    // استرجاع البيانات المحفوظة تلقائياً للعميل (تسجيل دخول تلقائي لراحة الزبون)
    if(localStorage.getItem('clientName')) {
        document.getElementById('clientName').value = localStorage.getItem('clientName');
    }
    if(localStorage.getItem('phoneNumber')) {
        document.getElementById('phoneNumber').value = localStorage.getItem('phoneNumber');
    }

    function validateEgyptianPhone(phone) {
        const phoneRegex = /^01[0-2,5]{1}[0-9]{8}$/;
        return phoneRegex.test(phone.replace(/\s|-/g, ''));
    }

    // كود جلب اللايف لوكيشن وبأعلى دقة High Accuracy
    locationBtn.addEventListener('click', function() {
        if (!navigator.geolocation) {
            showLocationStatus('error', 'متصفحك لا يدعم تحديد الموقع');
            return;
        }

        locationBtn.classList.add('loading');
        locationBtnText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>جاري تحديد موقعك بدقة...';
        showLocationStatus('info', 'يرجى السماح بالوصول إلى موقعك الحالي');

        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;

                document.getElementById('latitude').value = lat;
                document.getElementById('longitude').value = lng;
                document.getElementById('locationAccuracy').value = accuracy;

                locationAcquired = true;
                locationBtn.classList.remove('loading');
                locationBtn.classList.add('success');
                locationBtnText.innerHTML = '<i class="bi bi-check-circle-fill"></i> تم تحديد الموقع بنجاح';
                showLocationStatus('success', `تم التقاط موقعك الحالي بدقة تميز بـ ${Math.round(accuracy)} متر`);
            },
            function(error) {
                locationBtn.classList.remove('loading');
                let errorMsg = 'فشل تحديد الموقع';
                
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        errorMsg = 'تم رفض الإذن - يرجى تفعيل الـ GPS وصلاحية الموقع للمتصفح';
                        break;
                    case error.POSITION_UNAVAILABLE:
                        errorMsg = 'معلومات الموقع غير متاحة حالياً، تأكد من الشبكة';
                        break;
                    case error.TIMEOUT:
                        errorMsg = 'انتهت المهلة، يرجى إعادة المحاولة مرة أخرى';
                        break;
                }
                
                showLocationStatus('error', errorMsg);
            },
            {
                enableHighAccuracy: true,
                timeout: 12000,
                maximumAge: 0
            }
        );
    });

    function showLocationStatus(type, message) {
        locationStatus.className = `location-status show ${type}`;
        locationStatus.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle' : type === 'error' ? 'x-circle' : 'info-circle'}-fill me-2"></i>${message}`;
    }

    // التحقق من البيانات والرفع للفيربيز
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        form.classList.remove('was-validated');
        successAlert.classList.remove('show');

        let isValid = true;
        const nameInput = document.getElementById('clientName');
        const phoneInput = document.getElementById('phoneNumber');
        const detailsInput = document.getElementById('orderDetails');

        if (!nameInput.value.trim()) { nameInput.classList.add('is-invalid'); isValid = false; } 
        else { nameInput.classList.remove('is-invalid'); }

        if (!validateEgyptianPhone(phoneInput.value)) { phoneInput.classList.add('is-invalid'); isValid = false; } 
        else { phoneInput.classList.remove('is-invalid'); }

        if (!detailsInput.value.trim()) { detailsInput.classList.add('is-invalid'); isValid = false; } 
        else { detailsInput.classList.remove('is-invalid'); }

        if (!locationAcquired) {
            showLocationStatus('error', 'من فضلك اضغط على زر تحديد الموقع أولاً لتوصيل الطلب بدقة');
            locationBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
            isValid = false;
        }

        if (!isValid) return;

        // حفظ بيانات العميل محلياً لتسهيل المرات القادمة
        localStorage.setItem('clientName', nameInput.value.trim());
        localStorage.setItem('phoneNumber', phoneInput.value.replace(/\s|-/g, ''));

        // تجهيز بيانات الطلب بنفس الهيكل المتوافق مع الأدمن
        const orderData = {
            clientName: nameInput.value.trim(),
            phoneNumber: phoneInput.value.replace(/\s|-/g, ''),
            orderDetails: detailsInput.value.trim(),
            latitude: parseFloat(document.getElementById('latitude').value),
            longitude: parseFloat(document.getElementById('longitude').value),
            accuracy: parseFloat(document.getElementById('locationAccuracy').value),
            status: 'pending',
            createdAt: new Date().toISOString()
        };

        // الرفع المباشر لقاعدة بيانات Realtime Database لقسم الطلبات
        try {
            if (window.firebaseDB) {
                const { db, ref, push, serverTimestamp } = window.firebaseDB;
                orderData.timestamp = serverTimestamp(); 
                
                // الدفع للـ node المسمى 'orders' لتسمع فورا عند الأدمن لايف
                await push(ref(db, 'orders'), orderData);
                console.log('Order sent to Firebase:', orderData);
            } else {
                console.log('Firebase integration missing. Local Data:', orderData);
            }
        } catch (error) {
            console.error('Firebase Error:', error);
            alert('حدث خطأ غير متوقع أثناء إرسال طلبك، حاول مجدداً.');
            return;
        }
        
        // إظهار رسالة النجاح الكبيرة
        successAlert.classList.add('show');
        successAlert.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        // إعادة تهيئة الحقول (مع بقاء الاسم والهاتف مسترجعين تلقائي)
        detailsInput.value = '';
        locationAcquired = false;
        locationBtn.classList.remove('success', 'loading');
        locationBtnText.innerHTML = '<i class="bi bi-geo-alt-fill"></i> تحديد الموقع الحالي';
        locationStatus.classList.remove('show');
        
        form.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));

        setTimeout(() => {
            successAlert.classList.remove('show');
        }, 5000);
    });

    phoneInput.addEventListener('input', function() {
        if (this.value && !validateEgyptianPhone(this.value)) { this.classList.add('is-invalid'); } 
        else { this.classList.remove('is-invalid'); }
    });
});
</script>
</body>
</html>
